name: Ingesta diaria de proyectos

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC = 03:00 Chile
  workflow_dispatch:
    inputs:
      only:
        description: "Slug de un solo scraper a correr (opcional)"
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Seed sources (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx tsx scripts/seed-sources.ts

      - name: Run scrapers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ONLY_SCRAPER: ${{ github.event.inputs.only }}
        run: npx tsx scripts/run-scrapers.ts

      - name: Coverage check
        if: ${{ github.event.inputs.only == '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx tsx scripts/coverage-check.ts

      - name: Resolve smoke target URL
        id: smoke_target
        env:
          DEPLOYMENT_URL_SECRET: ${{ secrets.DEPLOYMENT_URL }}
        run: |
          if [ -n "$DEPLOYMENT_URL_SECRET" ]; then
            echo "url=$DEPLOYMENT_URL_SECRET" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::DEPLOYMENT_URL secret missing; using production URL fallback"
          echo "url=https://iica-chile-plataforma.vercel.app" >> "$GITHUB_OUTPUT"

      - name: Smoke test post-ingesta
        if: success()
        env:
          DEPLOYMENT_URL: ${{ steps.smoke_target.outputs.url }}
        run: npx tsx scripts/smoke-test.ts

      - name: Summary
        if: always()
        run: |
          echo "## Resultado de ingesta" >> $GITHUB_STEP_SUMMARY
          echo "- Ejecutado: $(date -u +%FT%TZ)" >> $GITHUB_STEP_SUMMARY
          echo "- Disparador: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
