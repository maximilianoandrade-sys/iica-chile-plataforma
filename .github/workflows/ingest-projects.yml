name: Ingest — Capa A (scrapers determinísticos)

on:
  schedule:
    - cron: "0 11 * * *" # 11:00 UTC diario para mantener datos vigentes en producción
  workflow_dispatch:

jobs:
  ingest:
    name: Ejecutar scrapers (FIA, FIA licitaciones, CORFO, INDAP, FONTAGRO, CNR, IICA)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Seed sources (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
        run: npx tsx scripts/seed-sources.ts

      - name: Run deterministic scrapers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
        run: npx tsx scripts/run-scrapers.ts

      - name: Coverage check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx tsx scripts/coverage-check.ts

      - name: Summary
        if: always()
        run: |
          echo "## Resultado de ingesta" >> $GITHUB_STEP_SUMMARY
          echo "- Ejecutado: $(date -u +%FT%TZ)" >> $GITHUB_STEP_SUMMARY
          echo "- Disparador: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
