name: Link Guardian - Verification
on:
  schedule:
    - cron: '0 0 * * 1' # Todos los lunes a las 00:00 UTC
  workflow_dispatch: # Permite ejecución manual
  push:
    paths:
      - 'data/projects.json'

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run Link Verification Script
        run: node scripts/check_all_links.js

      - name: Upload Links Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: links-report
          path: scripts/broken_links.json
          retention-days: 30
